name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  backend-tests:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libopenslide-dev protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Scope fmt/clippy to PathCollab's own crate; the vendored fovea submodule
      # is third-party (it has its own CI) and must not be reformatted or linted
      # here — newer toolchains flag style/lints fovea was clean under.
      - name: Check formatting
        run: cargo fmt -p pathcollab-server -- --check

      - name: Clippy
        run: cargo clippy -p pathcollab-server --no-deps --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test --all-targets

  frontend-tests:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # The web app depends on @fovea/viewer (file:../vendor/fovea/packages/fovea-js),
      # whose dist/ + wasm pkg/ are gitignored, so build the fovea engine first.
      - name: Install Rust toolchain (fovea wasm)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo (fovea wasm)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            vendor/fovea/target/
          key: ${{ runner.os }}-fovea-wasm-${{ hashFiles('vendor/fovea/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-fovea-wasm-

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build fovea engine (wasm + @fovea/viewer)
        working-directory: vendor/fovea
        run: |
          node scripts/build-wasm.mjs
          cd packages/fovea-js
          bun install
          bun run build

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Lint
        working-directory: web
        run: bun run lint

      - name: Type check
        working-directory: web
        run: bun run tsc --noEmit

      - name: Build
        working-directory: web
        run: bun run build
        continue-on-error: true

      - name: Run frontend tests
        working-directory: web
        run: bun run test:run

      - name: Run frontend tests with coverage
        working-directory: web
        run: bun run test:coverage
        continue-on-error: true

  # Docker build verification
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
